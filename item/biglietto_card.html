<article class="ticket-card [CategoriaClass]" aria-labelledby="titolo-[TipoID]">
    <div class="card-header">
        <img src="[URLImmagine]" alt="[AltTextImmagine]" class="card-img" width="400" height="220" loading="lazy" />
    </div>
    <div class="card-body">
        <h2 id="titolo-[TipoID]" class="card-category">[CategoriaText]</h2>
        <p class="ticket-price">A partire da: <strong>[PrezzoBiglietto]</strong></p>
    </div>
    <div class="card-footer">
        <a href="[LinkAcquisto]" class="btn-primary" aria-label="Acquista la categoria [CategoriaText]">Acquista Ora</a>
    </div>
</article>
