<li class="mail-row [StatoLetta]" data-id="[IDDomanda]">
    <div class="mail-row-header">
        <div class="read-dot"><span class="sr-only">[StatoTesto]</span></div>
        <div class="sender">[Username]</div>
        <div class="subject">[SommarioMessaggio]</div>
        <div class="date">[DataInvio]</div>
    </div>
    <div class="mail-content">
        <p class="full-message">"[TestoCompleto]"</p>
        [FormRisposta]
    </div>
</li>
