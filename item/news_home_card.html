<article class="news-card">
    <div class="card-image">
        <img src="assets/images/[ImmagineNews]"
             alt="Immagine correlata alla notizia: [TitoloNews]"
             width="300" height="200" loading="lazy" />
    </div>
    <div class="card-content">
        <time datetime="[DataIso]">[DataIt]</time>
        <h3>[TitoloNews]</h3>
        <a href="php-pages/News.php?id=[IdNews]"
           class="read-more"
           aria-label="Leggi la notizia completa: [TitoloNews]">Leggi di più</a>
    </div>
</article>
