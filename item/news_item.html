<article class="news-card" id="news-[IdNews]" aria-labelledby="news-titolo-[IdNews]" tabindex="0">
    <div class="card-image">
        <img src="../[PercorsoImg]"
             alt="[AltImmagine]"
             class="news-img"
             width="300" height="200"
             loading="lazy" />
    </div>
    <div class="card-content">
        <time datetime="[DataIso]">[DataLeggibile]</time>
        <h2 id="news-titolo-[IdNews]">[Titolo]</h2>
        <p>[Testo]</p>
    </div>
</article>
