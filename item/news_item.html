<article class="news-card">
    <div class="card-image">
        <img src="../[PercorsoImg]" alt="Immagine correlata alla notizia: [Titolo]" width="300" height="200">
    </div>
    <div class="card-content">
        <time datetime="[DataIso]">[DataLeggibile]</time>
        <h2>[Titolo]</h2>
        <p>[Testo]</p>
    </div>
</article>
