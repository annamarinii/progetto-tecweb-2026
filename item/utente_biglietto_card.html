<li>
    <article class="ticket-card-user"
             aria-label="Biglietto [TipoLabel] — [DataEvento], [Stadio], settore [Tribuna], ordine numero [NumeroOrdine], quantità [Quantita]">

        <div class="tcu-type">
            <h3 class="tcu-type-label">[TipoLabel]</h3>
        </div>

        <div class="tcu-details">
            <p class="tcu-evento">[DataEvento]</p>
            <p class="tcu-location">
                <span class="tcu-stadio">[Stadio]</span>
                <span class="tcu-sep" aria-hidden="true"> &mdash; </span>
                <span class="tcu-tribuna">Settore [Tribuna]</span>
            </p>
        </div>

        <div class="tcu-meta">
            <dl>
                <div class="tcu-meta-item">
                    <dt>Ordine N°</dt>
                    <dd>[NumeroOrdine]</dd>
                </div>
                <div class="tcu-meta-item">
                    <dt>Qtà</dt>
                    <dd>[Quantita]</dd>
                </div>
            </dl>
        </div>

    </article>
</li>
