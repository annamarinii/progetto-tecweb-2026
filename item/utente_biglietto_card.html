<li>
    <article class="ticket-card-user"
             aria-label="Biglietto [TipoLabel] — [DataEvento], [Stadio], settore [Tribuna], ordine numero [NumeroOrdine], quantità [Quantita]">

        <div class="tcu-type">
            <h3 class="tcu-type-label">[TipoLabel]</h3>
        </div>

        <div class="tcu-details">
            <p class="tcu-evento">[DataEvento]</p>
            <dl class="specifiche-match">
                <div class="spec-riga">
                    <dt>Stadio:</dt>
                    <dd>[Stadio]</dd>
                </div>
                <div class="spec-riga">
                    <dt>Settore:</dt>
                    <dd>[Tribuna]</dd>
                </div>
            </dl>
        </div>

        <div class="tcu-meta">
            <dl>
                <div class="tcu-meta-item">
                    <dt>Ordine N°</dt>
                    <dd>[NumeroOrdine]</dd>
                </div>
                <div class="tcu-meta-item">
                    <dt>Qtà</dt>
                    <dd>[Quantita]</dd>
                </div>
            </dl>
        </div>

    </article>
</li>
