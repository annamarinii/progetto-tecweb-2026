<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="stylesheet" href="../assets/css/style.css" media="screen" />
    <link rel="stylesheet" href="../assets/css/mobile.css" media="screen and (max-width: 992px)" />
    <link rel="stylesheet" href="../assets/css/print.css" media="print" />

</head>
<body id="top">

        <p class="noscript-warning">Per gestire il carrello e procedere al pagamento è necessario abilitare JavaScript nel browser.</p>

[Header]

    <nav id="breadcrumb" aria-label="Percorso di navigazione">
        <ol>
            <li><a href="../index.php" lang="en">Home</a></li>
            <li><span class="breadcrumb-active" aria-current="page">Carrello</span></li>
        </ol>
    </nav>
    <main id="main-content" class="main-carrello">
        <section class="intro-sezione" aria-labelledby="titolo-carrello">
            <h1 id="titolo-carrello">Il tuo Carrello</h1>
            <div class="divider" aria-hidden="true"></div>

        [banner_esito]

        <div class="carrello-layout">
            <section aria-label="Elenco biglietti nel carrello" id="cart-items-container">

                <div class="summary-row">
                    <span>Subtotale</span>
                    <span id="cart-subtotale">[totale_carrello]</span>

                <div class="summary-row summary-total">
                    <strong>Totale</strong>
                    <strong id="totale-prezzo">[totale_carrello]</strong>
                </div>
                [pulsante_acquisto]
            </aside>
        </div>
