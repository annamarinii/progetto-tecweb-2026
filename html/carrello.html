<!DOCTYPE html>
<html lang="it" xml:lang="it" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrello</title>
    <link rel="stylesheet" href="../assets/css/style.css" media="screen" />
    <link rel="stylesheet" href="../assets/css/print.css" media="print" />

</head>
<body id="top">
    <a href="#main-content" class="skip-link">Vai al contenuto</a>
[Header]

    <nav id="breadcrumb" aria-label="Percorso di navigazione">
        <p>Ti trovi in: <a href="../index.php" lang="en">Home</a> &gt; <span>Carrello</span></p>
    </nav>
    <main id="main-content" id="main-carrello">
        <section class="intro-sezione" aria-labelledby="titolo-carrello">
            <h1 id="titolo-carrello">Il tuo Carrello</h1>
            <div class="divider" aria-hidden="true"></div>
        </section>

        [banner_esito]

        <div class="carrello-layout">
            <section aria-label="Elenco biglietti nel carrello" id="cart-items-container">
                [lista_carrello]
            </section>

            <aside class="cart-summary" aria-label="Riepilogo ordine">
                <h2>Riepilogo Ordine</h2>
                <div class="summary-row">
                    <span>Subtotale</span>
                    <span id="cart-subtotale">[totale_carrello]</span>
                </div>
                <div class="summary-row summary-total">
                    <strong>Totale</strong>
                    <strong id="totale-prezzo">[totale_carrello]</strong>
                </div>
                [pulsante_acquisto]
            </aside>
        </div>
    </main>
[Footer]
<script src="../javascript/script.js"></script>
<script src="../javascript/carrello.js"></script>
    <a href="#top" class="back-to-top"><span aria-hidden="true">&uarr;</span><span class="sr-only">Torna su</span></a>
