<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
     <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header id="header-sito">
        <div id="logo-container">
            <img src="logo.png" alt="Logo Patavium Open" width="80">
            <h1>Patavium Open</h1>
        </div>

        <nav id="menu" aria-label="Menu principale">
            <ul>
                <li><a href="index.html" lang="en">Home</a></li>
                <li><a href="biglietti.html">Biglietti</a></li>
                <li><a href="news.html" lang="en">News</a></li>
                <li><a href="domande.html">Domande</a></li>
            </ul>
        </nav>

        <nav id="menu-utente" aria-label="Menu utente">
            <ul>
                <li id="currentLink">Profilo</li>
                <li><a href="carrello.html">Carrello (0)</a></li>
            </ul>
        </nav>
    </header>

    <nav id="breadcrumb" aria-label="Percorso di navigazione">
        <p>Ti trovi in: <a href="index.html" lang="en">Home</a> &gt; <span>Profilo</span></p>
    </nav>
    
    <main>
        <section aria-labelledby="titolo-login">
            <h2 id="titolo-login">SONO GIÀ CLIENTE.</h2>
            
            <form action="app/login.php" method="post">
                <div>
                    <label for="email">E-mail</label>
                    <br>
                    <input type="email" id="email" name="email" placeholder="Inserisci l'e-mail" required>
                </div>

                <br>

                <div>
                    <label for="pass">Password</label>
                    <br>
                    <input type="password" id="pass" name="password" placeholder="Inserisci la password" required>
                </div>

                <br>

                <button type="submit">Login</button>
            </form>
        </section>

        <hr aria-hidden="true">

        <section aria-labelledby="titolo-nuovo">
            <h2 id="titolo-nuovo">NUOVO CLIENTE?</h2>
            <p>Se non hai ancora un account, registrati per acquistare i biglietti del Patavium Open.</p>
            
            <a href="registrazione.html" role="button">Registrazione</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Patavium Open Tennis Tournament</p>
    </footer>

</body>
</html>
