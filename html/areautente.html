<!DOCTYPE html>
<html lang="it" xml:lang="it" xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Area Personale Utente | Patavium Open</title>
    <link rel="stylesheet" href="../assets/css/style.css" media="screen" />
    <link rel="stylesheet" href="../assets/css/print.css" media="print" />
</head>

<body id="top">
    <a href="#main-content" class="skip-link">Vai al contenuto</a>

    [Header]

    <nav id="breadcrumb" aria-label="Percorso di navigazione">
        <p>Ti trovi in: <a href="../home.html" lang="en">Home</a> &gt; <span class="breadcrumb-active"
                aria-current="page">Profilo</span></p>
        <a href="../php-Manager/Logout.php" class="btn-logout-small" aria-label="Esci dal tuo account" lang="en">Log
            Out</a>
    </nav>
    <main id="main-content" class="user-page-main">
        <div class="user-page-header">
            <h1>Area Personale</h1>
            <div class="divider"></div>
        </div>

        <div class="user-layout">

            <aside class="sidebar-user">
                <nav aria-label="Menu principale area utente">
                    <details open class="menu-details">
                        <summary>
                            <h2>Il mio Account</h2>
                        </summary>
                        <ul class="menu-list-user">
                            <li><a href="#profilo" class="tab-link active" data-target="profilo">Dati Personali</a></li>
                            <li><a href="#miei-biglietti" class="tab-link" data-target="miei-biglietti">I miei
                                    biglietti</a></li>
                            <li><a href="#centro-notifiche" class="tab-link"
                                    data-target="centro-notifiche">Notifiche</a></li>
                        </ul>
                    </details>
                </nav>
            </aside>

            <div class="content-area-user">

                <section id="profilo" aria-labelledby="titolo-profilo" class="content-card tab-content active">
                    <h2 id="titolo-profilo">I Tuoi Dati</h2>
                    <form class="profile-form" action="../php-pages/AreaUtente.php" method="POST">
                        <div class="form-gruppo">
                            <label for="nome">Nome:</label>
                            <input type="text" id="nome" name="nome" value="[nome_utente]" readonly="readonly" />
                        </div>
                        <div class="form-gruppo">
                            <label for="cognome">Cognome:</label>
                            <input type="text" id="cognome" name="cognome" value="[cognome_utente]"
                                readonly="readonly" />
                        </div>
                        <div class="form-gruppo">
                            <label for="email">Indirizzo Email:</label>
                            <input type="email" id="email" name="email" value="[email_utente]" readonly="readonly" />
                        </div>
                        <div class="form-gruppo">
                            <label for="username">Username:</label>
                            <input type="text" id="username" name="username" value="[username_utente]"
                                readonly="readonly" />
                        </div>
                        <button type="button" id="btn-modifica" class="btn-auth">Modifica Profilo</button>
                        <button type="submit" id="btn-salva" class="btn-auth d-none">Salva
                            Modifiche</button>
                    </form>
                </section>

                <section id="miei-biglietti" aria-labelledby="titolo-biglietti" class="content-card tab-content">
                    <h2 id="titolo-biglietti">I miei biglietti</h2>
                        [lista_ordini]
                </section>

                <section id="centro-notifiche" aria-labelledby="titolo-notifiche" class="content-card tab-content">
                    <h2 id="titolo-notifiche">Comunicazioni dal Team</h2>
                    <div role="region" aria-live="polite">
                            [lista_notifiche]
                    </div>
                </section>

            </div>
        </div>
    </main>

    <script src="../javascript/areautente.js"></script>
    <script src="../javascript/gestione_risposte_utente.js"></script>
    <script src="../javascript/script.js"></script>
    <a href="#top" class="back-to-top"><span aria-hidden="true">&uarr;</span><span class="sr-only">Torna su</span></a>
</body>

</html>
